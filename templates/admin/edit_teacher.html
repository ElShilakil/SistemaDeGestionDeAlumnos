{% extends "base.html" %}

{% block title %}Editar Profesor - Control Escolar{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg border-t-4 border-institutionalBlue">
    <div class="mb-6">
        <a href="{{ url_for('admin.manage_teachers') }}" class="text-institutionalBlue hover:underline">&larr; Volver</a>
        <h1 class="text-2xl font-bold text-gray-800 mt-2">Editar Profesor</h1>
    </div>

    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Nombre(s)</label>
            <input type="text" name="first_name" value="{{ teacher.first_name }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalBlue outline-none" required>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Apellido Paterno</label>
                <input type="text" name="last_name_paternal" value="{{ teacher.last_name_paternal }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalBlue outline-none" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Apellido Materno</label>
                <input type="text" name="last_name_maternal" value="{{ teacher.last_name_maternal or '' }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalBlue outline-none">
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Correo Electrónico</label>
            <input type="email" name="email" value="{{ teacher.email }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalBlue outline-none" placeholder="usuario@cinsurgentes.edu.mx" pattern="^.{6}@cinsurgentes\.edu\.mx$" title="El correo debe tener exactamente 6 caracteres antes de @cinsurgentes.edu.mx" required>
        </div>
        <div class="mb-6 p-4 bg-gray-50 rounded border">
            <label class="block text-gray-700 text-sm font-bold mb-2">Cambiar Contraseña (Opcional)</label>
            <input type="password" name="password" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalBlue outline-none" placeholder="Dejar en blanco para mantener la actual">
        </div>
        
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-institutionalBlue hover:bg-blue-900 text-white font-bold py-2 rounded transition-colors">
                Guardar Cambios
            </button>
            <a href="{{ url_for('admin.manage_teachers') }}" class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded transition-colors">
                Regresar
            </a>
        </div>
    </form>
</div>
{% endblock %}
