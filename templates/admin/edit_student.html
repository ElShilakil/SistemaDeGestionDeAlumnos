{% extends "base.html" %}

{% block title %}Editar Estudiante - Control Escolar{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg border-t-4 border-institutionalGreen">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-charcoal uppercase tracking-tight">Editar Estudiante</h2>
        <p class="text-gray-500 text-sm italic">Actualiza la información académica y de contacto.</p>
    </div>

    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase">Nombre(s)</label>
                <input type="text" name="first_name" value="{{ student.first_name }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase">Apellido Paterno</label>
                <input type="text" name="last_name_paternal" value="{{ student.last_name_paternal }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase">Apellido Materno</label>
                <input type="text" name="last_name_maternal" value="{{ student.last_name_maternal or '' }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase">CURP</label>
                <input type="text" name="curp" value="{{ student.curp }}" maxlength="18" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none" required>
            </div>
        </div>

        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6">
            <h3 class="text-sm font-black text-gray-700 uppercase mb-4 tracking-widest border-b pb-2">Información del Tutor</h3>
            <div class="mb-4">
                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Nombre Completo</label>
                <input type="text" name="nombre_tutor" value="{{ student.nombre_tutor or '' }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Teléfono</label>
                    <input type="text" name="telefono_tutor" value="{{ student.telefono_tutor or '' }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
                </div>
                <div>
                    <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Correo Electrónico</label>
                    <input type="email" name="email_tutor" value="{{ student.email_tutor or '' }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase">Grado</label>
                <select name="grade" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
                    {% for g in range(1, 7) %}
                    <option value="{{ g }}" {% if student.grade == g %}selected{% endif %}>{{ g }}° Grado</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase">Grupo</label>
                <select name="group" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
                    {% for grp in ['A', 'B', 'C'] %}
                    <option value="{{ grp }}" {% if student.group == grp %}selected{% endif %}>Grupo {{ grp }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4">
            <button type="submit" class="flex-1 bg-institutionalGreen hover:bg-green-700 text-white font-bold py-2 rounded shadow transition-colors uppercase tracking-widest text-sm">
                Guardar Cambios
            </button>
            <a href="{{ url_for('admin.manage_students') }}" class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded transition-colors">
                Regresar
            </a>
        </div>
    </form>
</div>
{% endblock %}
