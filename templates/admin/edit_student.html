{% extends "base.html" %}

{% block title %}Editar Estudiante - Control Escolar{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg border-t-4 border-institutionalGreen">
    <div class="mb-6">
        <a href="{{ url_for('manage_students') }}" class="text-institutionalGreen hover:underline">&larr; Volver</a>
        <h1 class="text-2xl font-bold text-gray-800 mt-2">Editar Estudiante</h1>
    </div>

    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">CURP</label>
            <input type="text" name="curp" value="{{ student.curp }}" maxlength="18" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Nombre(s)</label>
            <input type="text" name="first_name" value="{{ student.first_name }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none" required>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Apellido Paterno</label>
                <input type="text" name="last_name_paternal" value="{{ student.last_name_paternal }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Apellido Materno</label>
                <input type="text" name="last_name_maternal" value="{{ student.last_name_maternal or '' }}" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Datos del Tutor</label>
            <textarea name="tutor_data" rows="2" class="w-full border rounded p-2 focus:ring-2 focus:ring-institutionalGreen outline-none">{{ student.tutor_data }}</textarea>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Grado</label>
                <select name="grade" class="w-full border rounded p-2" required>
                    {% for g in range(1, 7) %}
                    <option value="{{ g }}" {% if student.grade == g %}selected{% endif %}>{{ g }}°</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Grupo</label>
                <select name="group" class="w-full border rounded p-2" required>
                    {% for grp in ['A', 'B', 'C'] %}
                    <option value="{{ grp }}" {% if student.group == grp %}selected{% endif %}>{{ grp }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-institutionalGreen hover:bg-green-700 text-white font-bold py-2 rounded transition-colors">
                Guardar Cambios
            </button>
            <a href="{{ url_for('manage_students') }}" class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded transition-colors">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
