{% extends "base.html" %}

{% block title %}Iniciar Sesión - Control Escolar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-lg shadow-2xl border-t-8 border-deepBlue ring-1 ring-skyBlue ring-opacity-20">
        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='logo.webp') }}" alt="Logo" class="h-20 w-20 mx-auto mb-4" style="mix-blend-mode: multiply;">
            <h2 class="text-3xl font-black text-charcoal uppercase tracking-tight">Acceso Escolar</h2>
            <p class="text-gray-500 text-sm italic">Colegio Insurgentes</p>
        </div>
        <form method="POST">
            <div class="mb-6">
                <label class="block text-charcoal text-xs font-black uppercase tracking-widest mb-2">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" class="w-full border-2 border-gray-100 rounded-lg py-3 pl-10 pr-4 focus:border-deepBlue focus:ring-0 outline-none transition-colors" placeholder="usuario@cinsurgentes.edu.mx" pattern="^[^@]{5,}@cinsurgentes\.edu\.mx$" title="El correo debe tener al menos 5 caracteres antes de @cinsurgentes.edu.mx" required>
                </div>
            </div>
            <div class="mb-8">
                <label class="block text-charcoal text-xs font-black uppercase tracking-widest mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" class="w-full border-2 border-gray-100 rounded-lg py-3 pl-10 pr-4 focus:border-deepBlue focus:ring-0 outline-none transition-colors" placeholder="••••••••" required>
                </div>
            </div>
            <div class="flex flex-col gap-4 mt-4">
                <button type="submit" class="w-full bg-goldenYellow hover:bg-yellow-400 text-charcoal font-black py-4 rounded-lg shadow-lg transform transition-all hover:scale-[1.02] active:scale-95 uppercase tracking-widest">
                    ENTRAR AL SISTEMA
                </button>
                <a href="{{ url_for('auth.index') }}" class="w-full text-center text-gray-500 hover:text-gray-700 text-xs font-bold uppercase tracking-widest py-2">
                   &larr; Regresar al Inicio
                </a>            </div>
        </form>
    </div>
</div>
{% endblock %}
