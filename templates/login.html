{% extends "base.html" %}

{% block title %}Iniciar Sesión - Control Escolar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow-lg rounded-lg overflow-hidden mt-10">
    <div class="bg-institutionalBlue py-4 px-6 text-white text-center">
        <h2 class="text-2xl font-bold">Bienvenido</h2>
        <p class="text-sm">Ingresa tus credenciales para continuar</p>
    </div>
    <form method="POST" class="py-8 px-8">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="email">
                Correo Electrónico
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-institutionalBlue" id="email" name="email" type="email" placeholder="admin@escuela.com" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                Contraseña
            </label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-institutionalBlue" id="password" name="password" type="password" placeholder="******************" required>
        </div>
        <div class="flex items-center justify-between">
            <button class="bg-institutionalBlue hover:bg-blue-900 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition-colors w-full" type="submit">
                Entrar
            </button>
        </div>
    </form>
</div>
{% endblock %}
